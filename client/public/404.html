<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pixel Community</title>
    <script type="text/javascript">
      // This script takes the current URL and redirects to the index page
      // while preserving the path and search parameters in a query string.
      // This allows GitHub Pages to support Single Page Applications (SPA).
      var l = window.location;
      var repoName = '/Pixel-Community';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repoName + '/?/' +
        l.pathname.slice(repoName.length + 1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
